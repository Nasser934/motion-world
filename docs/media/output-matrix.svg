<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1400" height="520" rx="30" fill="#0A1023"/><text x="70" y="70" fill="white" font-family="Inter,Arial" font-size="32" font-weight="800">Choose the right output for each surface</text><text x="70" y="105" fill="#B6C1D7" font-family="Inter,Arial" font-size="18">Motion World does not force one media format onto every platform.</text>
<g font-family="Inter,Arial">
<rect x="70" y="155" width="295" height="280" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.11"/><text x="98" y="198" fill="#A98BFF" font-size="16" font-weight="700">SCRUB VIDEO</text><text x="98" y="235" fill="white" font-size="24" font-weight="800">Smooth cinematic motion</text><text x="98" y="275" fill="#C2CBE0" font-size="17">Short GOP MP4/WebM</text><text x="98" y="305" fill="#C2CBE0" font-size="17">Best for web and long scenes</text><text x="98" y="365" fill="#63E6BE" font-size="15" font-weight="700">Progress → currentTime</text>
<rect x="390" y="155" width="295" height="280" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.11"/><text x="418" y="198" fill="#A98BFF" font-size="16" font-weight="700">FRAME SEQUENCE</text><text x="418" y="235" fill="white" font-size="24" font-weight="800">Exact random access</text><text x="418" y="275" fill="#C2CBE0" font-size="17">WebP/PNG frame files</text><text x="418" y="305" fill="#C2CBE0" font-size="17">Best for native deterministic UI</text><text x="418" y="365" fill="#63E6BE" font-size="15" font-weight="700">Progress → frame index</text>
<rect x="710" y="155" width="295" height="280" rx="24" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.11"/><text x="738" y="198" fill="#A98BFF" font-size="16" font-weight="700">SPRITE ATLAS</text><text x="738" y="235" fill="white" font-size="24" font-weight="800">Compact short loops</text><text x="738" y="275" fill="#C2CBE0" font-size="17">Packed image + JSON map</text><text x="738" y="305" fill="#C2CBE0" font-size="17">Best for small UI components</text><text x="738" y="365" fill="#63E6BE" font-size="15" font-weight="700">Progress → atlas rectangle</text>
<rect x="1030" y="155" width="300" height="280" rx="24" fill="#63E6BE" fill-opacity="0.07" stroke="#63E6BE" stroke-opacity="0.22"/><text x="1058" y="198" fill="#63E6BE" font-size="16" font-weight="700">POSTERS / FALLBACK</text><text x="1058" y="235" fill="white" font-size="24" font-weight="800">Accessible static states</text><text x="1058" y="275" fill="#C2CBE0" font-size="17">Start · middle · end</text><text x="1058" y="305" fill="#C2CBE0" font-size="17">Reduced motion and previews</text><text x="1058" y="365" fill="#63E6BE" font-size="15" font-weight="700">Progress → nearest poster</text>
</g>
</svg>
